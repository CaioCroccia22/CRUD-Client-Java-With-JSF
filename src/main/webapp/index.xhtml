<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title>Cadastro de Clientes</title>
</h:head>

<h:body>
    <p:menubar id="menu">
        <p:submenu label="Cadastro" icon="pi pi-user">
            <p:menuitem value="Cliente" icon="pi pi-user-plus" />
        </p:submenu>
    </p:menubar>

    <h:form id="formCliente">

        <p:growl id="msgs" showDetail="true" />

        <p:panel header="Cadastro de Cliente" style="margin-top:15px;">
            <p:panelGrid columns="2" layout="grid"
                         columnClasses="ui-grid-col-2,ui-grid-col-4"
                         styleClass="ui-panelgrid-blank">

                <p:outputLabel for="cpf" value="CPF:" />
                <p:inputNumber id="cpf" value="#{clienteMB.client.cpf}"
                               decimalPlaces="0" thousandSeparator=""
                               required="true" requiredMessage="Informe o CPF" />

                <p:outputLabel for="nome" value="Nome:" />
                <p:inputText id="nome" value="#{clienteMB.client.name}"
                             required="true" requiredMessage="Informe o nome" />

                <p:outputLabel for="idade" value="Idade:" />
                <p:inputNumber id="idade" value="#{clienteMB.client.age}"
                               decimalPlaces="0" />

                <p:outputLabel for="telefone" value="Telefone:" />
                <p:inputNumber id="telefone" value="#{clienteMB.client.phone}"
                               decimalPlaces="0" thousandSeparator="" />

                <p:outputLabel for="endereco" value="Endereço:" />
                <p:inputText id="endereco" value="#{clienteMB.client.address}" />

                <p:outputLabel for="numero" value="Número:" />
                <p:inputNumber id="numero" value="#{clienteMB.client.number}"
                               decimalPlaces="0" />

                <p:outputLabel for="cidade" value="Cidade:" />
                <p:inputText id="cidade" value="#{clienteMB.client.city}" />

                <p:outputLabel for="estado" value="Estado:" />
                <p:inputText id="estado" value="#{clienteMB.client.state}" maxlength="2" />
            </p:panelGrid>

            <f:facet name="footer">
                <p:commandButton value="Salvar" icon="pi pi-check"
                                 action="#{clienteMB.save}"
                                 update="formCliente" />
                <p:commandButton value="Limpar" icon="pi pi-times"
                                 action="#{clienteMB.clear}"
                                 process="@this" update="formCliente"
                                 style="margin-left:8px;" />
            </f:facet>
        </p:panel>
		
        <p:panel header="Clientes Cadastrados" style="margin-top:15px;">
            <p:dataTable id="tabelaClientes" var="cli"
                         value="#{clienteMB.clients}"
                         emptyMessage="Nenhum cliente cadastrado."
                         paginator="true" rows="10"
                         rowsPerPageTemplate="5,10,20">

                <p:column headerText="ID">
                    <h:outputText value="#{cli.id}" />
                </p:column>
                <p:column headerText="CPF">
                    <h:outputText value="#{cli.cpf}" />
                </p:column>
                <p:column headerText="Nome">
                    <h:outputText value="#{cli.name}" />
                </p:column>
                <p:column headerText="Idade">
                    <h:outputText value="#{cli.age}" />
                </p:column>
                <p:column headerText="Telefone">
                    <h:outputText value="#{cli.phone}" />
                </p:column>
                <p:column headerText="Endereço">
                    <h:outputText value="#{cli.address}, #{cli.number}" />
                </p:column>
                <p:column headerText="Cidade/UF">
                    <h:outputText value="#{cli.city}/#{cli.state}" />
                </p:column>


            </p:dataTable>
        </p:panel>

        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
            <p:commandButton value="Sim" type="button"
                             styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
            <p:commandButton value="Não" type="button"
                             styleClass="ui-confirmdialog-no" icon="pi pi-times" />
        </p:confirmDialog>
    </h:form>
</h:body>
</html>
